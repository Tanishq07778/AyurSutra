<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AyurSutra — Find a Doctor</title>
  <script src="shared.js"></script>
</head>
<body>
<script>
  injectSharedStyles();
  Auth.requirePatient();
  buildNav('doctors-list.html');
</script>

<style>
  .search-hero {
    background: linear-gradient(135deg, var(--green-700) 0%, var(--green-600) 100%);
    border-radius: var(--radius-lg); padding: 32px;
    color: white; margin-bottom: 28px;
  }
  .search-hero h1 { font-family:'Cormorant Garamond',serif; font-size:30px; color:white; margin-bottom:6px; }
  .search-hero p  { opacity:0.85; font-size:15px; margin-bottom:20px; }
  .search-bar {
    display:flex; gap:10px; max-width:560px;
  }
  .search-bar input {
    flex:1; padding:11px 16px; border-radius:var(--radius-sm);
    border:none; font-size:14px; outline:none;
  }
  .search-bar button { padding:11px 20px; border-radius:var(--radius-sm); border:none; background:var(--gold); color:var(--green-900); font-weight:700; cursor:pointer; white-space:nowrap; }

  .filters-bar {
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:24px;
  }
  .filter-chip {
    padding:6px 14px; border:1.5px solid var(--border); border-radius:20px;
    background:var(--white); font-size:13px; font-weight:600; color:var(--text-500);
    cursor:pointer; transition:all 0.2s; white-space:nowrap;
  }
  .filter-chip:hover  { border-color:var(--green-700); color:var(--green-700); }
  .filter-chip.active { background:var(--green-700); color:white; border-color:var(--green-700); }

  .doctors-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:20px;
  }

  .doctor-card {
    background:var(--white); border:1px solid var(--border);
    border-radius:var(--radius-md); overflow:hidden;
    transition:all 0.25s; cursor:pointer;
  }
  .doctor-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); border-color:var(--green-600); }

  .doctor-card-top { padding:20px; display:flex; gap:14px; align-items:flex-start; }
  .doctor-info { flex:1; }
  .doctor-name { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--text-900); }
  .doctor-spec { font-size:13px; color:var(--green-700); font-weight:600; margin-top:2px; }
  .doctor-qual { font-size:12px; color:var(--text-300); margin-top:2px; }
  .avail-dot { width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px; }
  .avail-yes { background:var(--green-600); }
  .avail-no  { background:#9ca3af; }

  .doctor-card-stats {
    display:grid; grid-template-columns:1fr 1fr 1fr;
    border-top:1px solid var(--border);
  }
  .dc-stat { padding:12px; text-align:center; border-right:1px solid var(--border); }
  .dc-stat:last-child { border-right:none; }
  .dc-stat-val { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--text-900); }
  .dc-stat-lbl { font-size:11px; color:var(--text-300); margin-top:2px; }

  .doctor-card-footer { padding:14px 20px; display:flex; gap:8px; border-top:1px solid var(--border); background:var(--cream); }

  .rating-stars { color:var(--gold); font-size:13px; letter-spacing:1px; }

  .results-meta { font-size:14px; color:var(--text-300); margin-bottom:16px; }
</style>

<div class="page-wrap">

  <!-- Search hero -->
  <div class="search-hero">
    <h1>🩺 Find an Ayurvedic Doctor</h1>
    <p>Connect with certified practitioners for consultations and Panchakarma therapy</p>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name or specialization..." oninput="filterDoctors()">
      <button onclick="filterDoctors()">Search</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <span style="font-size:13px;font-weight:600;color:var(--text-500);">Specialization:</span>
    <div class="filter-chip active" onclick="setFilter('all', this)">All</div>
    <div class="filter-chip" onclick="setFilter('Panchakarma', this)">Panchakarma</div>
    <div class="filter-chip" onclick="setFilter('Kayachikitsa', this)">Kayachikitsa</div>
    <div class="filter-chip" onclick="setFilter('Shalya', this)">Shalya Tantra</div>
    <div class="filter-chip" onclick="setFilter('Streeroga', this)">Streeroga</div>
    <div class="filter-chip" onclick="setFilter('available', this)">✅ Available Now</div>
  </div>

  <div class="results-meta" id="resultsMeta">Loading doctors...</div>
  <div class="doctors-grid" id="doctorsGrid">
    <div style="grid-column:1/-1;" class="state-box"><div class="spinner"></div><p>Finding doctors...</p></div>
  </div>

</div>

<!-- Book Modal -->
<div class="modal-overlay" id="bookModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title">📅 Book Appointment</h3>
      <button class="modal-close" onclick="closeModal('bookModal')">✕</button>
    </div>
    <div id="bookDoctorInfo" style="display:flex;gap:12px;align-items:center;padding:14px;background:var(--cream);border-radius:var(--radius-sm);margin-bottom:20px;"></div>
    <div class="form-group"><label class="form-label">Appointment Date *</label><input type="date" class="form-control" id="apptDate"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Time Slot *</label>
        <select class="form-control" id="apptTime">
          <option value="">Select time...</option>
          <option>09:00 AM</option><option>09:30 AM</option>
          <option>10:00 AM</option><option>10:30 AM</option>
          <option>11:00 AM</option><option>11:30 AM</option>
          <option>02:00 PM</option><option>02:30 PM</option>
          <option>03:00 PM</option><option>03:30 PM</option>
          <option>04:00 PM</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-control" id="apptType">
          <option value="CONSULTATION">Consultation</option>
          <option value="PANCHAKARMA">Panchakarma</option>
          <option value="FOLLOW_UP">Follow-up</option>
          <option value="ABHYANGA">Abhyanga</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Reason for visit</label><textarea class="form-control" id="apptReason" rows="2" placeholder="Describe your symptoms or reason for consultation..."></textarea></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="confirmBooking()">✅ Confirm Booking</button>
      <button class="btn btn-secondary" onclick="closeModal('bookModal')">Cancel</button>
    </div>
  </div>
</div>

<script>
  let allDoctors = [];
  let activeFilter = 'all';
  let searchQuery = '';
  let selectedDoctor = null;

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); }));

  // ── Load doctors ──────────────────────────────────────────
  async function loadDoctors() {
    try {
      const res = await apiFetch('/doctors');
      allDoctors = res.data || [];
      if (!allDoctors.length) allDoctors = MockData.doctors; // fallback
    } catch(e) {
      allDoctors = MockData.doctors; // mock fallback
    }
    renderDoctors(allDoctors);
  }

  // ── Filter ────────────────────────────────────────────────
  function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filterDoctors();
  }

  function filterDoctors() {
    searchQuery = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allDoctors.filter(d => {
      const name = `${d.firstName} ${d.lastName}`.toLowerCase();
      const spec = (d.specialization||'').toLowerCase();
      const matchSearch = !searchQuery || name.includes(searchQuery) || spec.includes(searchQuery);
      const matchFilter = activeFilter === 'all'
        ? true
        : activeFilter === 'available'
          ? d.isAvailable !== false
          : (d.specialization||'').toLowerCase().includes(activeFilter.toLowerCase());
      return matchSearch && matchFilter;
    });
    renderDoctors(filtered);
  }

  // ── Render ─────────────────────────────────────────────────
  function renderDoctors(doctors) {
    document.getElementById('resultsMeta').textContent = `${doctors.length} doctor${doctors.length!==1?'s':''} found`;

    if (!doctors.length) {
      document.getElementById('doctorsGrid').innerHTML = `<div style="grid-column:1/-1;">${emptyHTML('🔍','No doctors found','Try adjusting your search or filters')}</div>`;
      return;
    }

    document.getElementById('doctorsGrid').innerHTML = doctors.map(d => {
      const initials = getInitials(d.firstName, d.lastName);
      const bg = getAvatarColor((d.firstName||'')+(d.lastName||''));
      const avail = d.isAvailable !== false;
      const stars = '★'.repeat(Math.round(d.rating||4.5)) + '☆'.repeat(5-Math.round(d.rating||4.5));
      return `
        <div class="doctor-card" onclick="openBookModal(${d.id})">
          <div class="doctor-card-top">
            <div class="avatar avatar-md" style="background:${bg};flex-shrink:0;">${initials}</div>
            <div class="doctor-info">
              <div class="doctor-name">Dr. ${d.firstName} ${d.lastName}</div>
              <div class="doctor-spec">${d.specialization || 'Ayurvedic Physician'}</div>
              <div class="doctor-qual">${d.qualification || 'BAMS'}</div>
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
                <span><span class="avail-dot ${avail?'avail-yes':'avail-no'}"></span><span style="font-size:12px;color:${avail?'var(--green-700)':'var(--text-300)'};">${avail?'Available':'Unavailable'}</span></span>
                <span class="rating-stars">${stars}</span>
              </div>
            </div>
          </div>
          <div class="doctor-card-stats">
            <div class="dc-stat">
              <div class="dc-stat-val">${d.experienceYears || '—'}</div>
              <div class="dc-stat-lbl">Yrs Exp.</div>
            </div>
            <div class="dc-stat">
              <div class="dc-stat-val">${d.rating ? d.rating.toFixed(1) : '4.5'}</div>
              <div class="dc-stat-lbl">Rating</div>
            </div>
            <div class="dc-stat">
              <div class="dc-stat-val">₹${d.consultationFee || '500'}</div>
              <div class="dc-stat-lbl">Fee</div>
            </div>
          </div>
          <div class="doctor-card-footer">
            <button class="btn btn-primary btn-sm" style="flex:1;justify-content:center;" onclick="event.stopPropagation();openBookModal(${d.id})">📅 Book Appointment</button>
            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();Toast.info('Doctor profile coming soon!')">View Profile</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Book modal ────────────────────────────────────────────
  function openBookModal(doctorId) {
    selectedDoctor = allDoctors.find(d => d.id === doctorId) || allDoctors.find(d => String(d.id)===String(doctorId));
    if (!selectedDoctor) { Toast.error('Doctor not found'); return; }

    const initials = getInitials(selectedDoctor.firstName, selectedDoctor.lastName);
    const bg = getAvatarColor((selectedDoctor.firstName||'')+(selectedDoctor.lastName||''));

    document.getElementById('bookDoctorInfo').innerHTML = `
      <div class="avatar avatar-sm" style="background:${bg};flex-shrink:0;">${initials}</div>
      <div>
        <div style="font-weight:700;font-size:15px;">Dr. ${selectedDoctor.firstName} ${selectedDoctor.lastName}</div>
        <div style="font-size:12px;color:var(--text-300);">${selectedDoctor.specialization||'Ayurvedic Physician'} · ₹${selectedDoctor.consultationFee||'500'}</div>
      </div>`;

    document.getElementById('apptDate').min = new Date().toISOString().split('T')[0];
    document.getElementById('apptDate').valueAsDate = new Date(Date.now() + 86400000);
    document.getElementById('bookModal').classList.add('open');
  }

  function confirmBooking() {
    const date  = document.getElementById('apptDate').value;
    const time  = document.getElementById('apptTime').value;
    const type  = document.getElementById('apptType').value;
    const reason= document.getElementById('apptReason').value;

    if (!date || !time) { Toast.warning('Please select date and time'); return; }

    // TODO: POST to /api/v1/appointments when backend is ready
    Toast.success(`Appointment booked for ${fmtDate(date)} at ${time}`);
    closeModal('bookModal');
  }

  // ── Init ──────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', loadDoctors);
</script>
</body>
</html>
