# ===================================================================
# AyurSutra Application Configuration
# ===================================================================

spring.application.name=AyurSutra
server.port=8080

# ===================================================================
# DATABASE — H2 File-Based (persists across restarts)
# ===================================================================
spring.datasource.url=jdbc:h2:file:./data/ayursutra_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin123

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===================================================================
# SECURITY
# ===================================================================
spring.security.user.name=admin
spring.security.user.password=admin123

# ===================================================================
# JWT
# ===================================================================
jwt.secret=AyurSutraSecretKeyForJWTTokenGeneration2024VeryLongSecretKey123456789
jwt.expiration=86400000

# ===================================================================
# FILE UPLOAD
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/reports

# ===================================================================
# GOOGLE CLOUD VISION OCR
# ===================================================================
google.application.credentials=src/main/resources/google-vision-key.json

# ===================================================================
# GOOGLE OAUTH2
# ===================================================================
#
# HOW TO SET UP ON EACH DEVICE:
#   Option A (recommended) — set environment variables before running:
#     Windows CMD:
#       set GOOGLE_CLIENT_ID=your-id-here.apps.googleusercontent.com
#       set GOOGLE_CLIENT_SECRET=your-secret-here
#       mvnw spring-boot:run
#
#     Windows PowerShell:
#       $env:GOOGLE_CLIENT_ID="your-id-here.apps.googleusercontent.com"
#       $env:GOOGLE_CLIENT_SECRET="your-secret-here"
#       .\mvnw spring-boot:run
#
#     Mac/Linux:
#       export GOOGLE_CLIENT_ID=your-id-here.apps.googleusercontent.com
#       export GOOGLE_CLIENT_SECRET=your-secret-here
#       ./mvnw spring-boot:run
#
#   Option B — create src/main/resources/application-local.properties
#   (already in .gitignore) and put your credentials there:
#       spring.security.oauth2.client.registration.google.client-id=your-id
#       spring.security.oauth2.client.registration.google.client-secret=your-secret
#   Then run with: mvnw spring-boot:run -Dspring-boot.run.profiles=local
#
#   Option C (quick test only, not for git) — paste values directly below.
#
# FIX: Using :- default syntax so the app starts even without env vars.
# Without this, Spring throws IllegalArgumentException at startup if the
# env var is missing, crashing the whole server on the other laptop.
# When client-id is empty, Spring auto-disables OAuth2 gracefully.
# ===================================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ===================================================================
# LOGGING
# ===================================================================
logging.level.root=INFO
logging.level.com.ayursutra=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# ===================================================================
# ERROR RESPONSES
# ===================================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=true