# ===================================================================
# AyurSutra Application Configuration
# ===================================================================

spring.application.name=AyurSutra
server.port=8080

# ===================================================================
# DATABASE — H2 File-Based (persists across restarts)
# ===================================================================
spring.datasource.url=jdbc:h2:file:./data/ayursutra_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin123

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Required for vitalSignRepository.flush() in VitalSignService
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===================================================================
# SECURITY
# ===================================================================
spring.security.user.name=admin
spring.security.user.password=admin123

# ===================================================================
# JWT
# ===================================================================
jwt.secret=AyurSutraSecretKeyForJWTTokenGeneration2024VeryLongSecretKey123456789
jwt.expiration=86400000

# ===================================================================
# FILE UPLOAD
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/reports

# ===================================================================
# GOOGLE CLOUD VISION OCR
# ===================================================================
#
# HOW THIS WORKS:
#   OCRService reads this Spring property in its @PostConstruct method and
#   sets it as a JVM system property with the key GOOGLE_APPLICATION_CREDENTIALS
#   so the Google Vision SDK can find it automatically.
#
#   The SDK itself only reads the ENVIRONMENT VARIABLE or the JVM system
#   property — NOT a Spring property directly — which is why the previous
#   code that set spring.cloud.gcp.credentials.location had no effect.
#
# TO ENABLE OCR:
#   1. Go to https://console.cloud.google.com
#   2. Create a project → Enable "Cloud Vision API"
#   3. IAM & Admin → Service Accounts → Create → Download JSON key
#   4. Place the JSON file at:  src/main/resources/google-vision-key.json
#   5. The line below already points there — no other change needed.
#
# TO DISABLE OCR (uploads still work without it):
#   Comment out the line below.
#
google.application.credentials=src/main/resources/google-vision-key.json

# ===================================================================
# GOOGLE OAUTH2
# ===================================================================
# ... other properties ...

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ===================================================================
# LOGGING
# ===================================================================
logging.level.root=INFO
logging.level.com.ayursutra=DEBUG
logging.level.org.springframework.web=WARN

# ===================================================================
# ERROR RESPONSES
# ===================================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=true